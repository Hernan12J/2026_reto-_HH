environments {

  local {
      webdriver {
        driver = edge
        maximize = true

        edge {
          driver = "C:/Users/hhern/Downloads/msedgedriver.exe"
        }

        capabilities {
          "ms:edgeOptions" {
            args = [
              "start-maximized"
            ]
          }
        }
      }
    }

  ci {
    webdriver {
      driver = chrome

      capabilities {
        browserName = "chrome"
        "goog:chromeOptions" {
          args = [
            "--headless=new",
            "--no-sandbox",
            "--disable-dev-shm-usage",
            "--window-size=1920,1080"
          ]
        }
      }
    }
  }

}