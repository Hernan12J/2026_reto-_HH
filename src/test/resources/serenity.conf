webdriver {
  driver = edge

  edge {
    driver = "C:/Users/hhern/Downloads/msedgedriver.exe"
  }

  capabilities {
    browserName = "MicrosoftEdge"
    "ms:edgeOptions" {
      args = [
        "start-maximized",
        "inprivate",
        "ignore-certificate-errors",
        "disable-popup-blocking",
        "remote-allow-origins=*"
      ]
    }
  }
}

environments {

  default {
    webdriver.base.url = "https://www.demoblaze.com/"
  }

  ci {
    webdriver {
      driver = chrome

      capabilities {
        browserName = "chrome"
        "goog:chromeOptions" {
          args = [
            "--headless=new",
            "--disable-gpu",
            "--no-sandbox",
            "--disable-dev-shm-usage",
            "--window-size=1920,1080",
            "--remote-allow-origins=*"
          ]
        }
      }
    }

    webdriver.base.url = "https://www.demoblaze.com/"
  }
}

serenity {
  project.name = "Automation Screenplay - DemoBlaze"
  take.screenshots = FOR_EACH_ACTION
  compress.filenames = true
  logging = VERBOSE
}