webdriver {
  driver = chrome

  chrome {
    switches = "--headless=new;--disable-gpu;--window-size=1920,1080;--no-sandbox;--disable-dev-shm-usage;--remote-allow-origins=*"
  }
}

serenity {
  project.name = "Automation Screenplay - DemoBlaze"
  take.screenshots = FOR_EACH_ACTION
  compress.filenames = true
  logging = VERBOSE
}

environments {
  default {
    webdriver.base.url = "https://www.demoblaze.com/"
  }

  qa {
    webdriver.base.url = "https://www.demoblaze.com/"
  }
}