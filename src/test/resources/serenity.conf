webdriver {
  driver = chrome

  chrome {
    driver = "C:/Users/hhern/Downloads/chromedriver-win64/chromedriver.exe"
  }

  capabilities {
    "goog:chromeOptions" {
      args = [
        "--remote-allow-origins=*",
        "--start-maximized"
      ]
    }
  }
}

serenity {
  project.name = "Automation Screenplay - DemoBlaze"
  take.screenshots = FOR_EACH_ACTION
  logging = VERBOSE
}